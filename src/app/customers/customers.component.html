<div class="container">
    <ng-container *ngIf="customers|async as listCustomers; else failure">
        <div class="card"> 
        <div class="card-header">Customers</div>
        <div class="card-body">
            <table class="table">
                <thead>
                <tr>
                    <th> ID</th><th>NAME</th><th>EMAIL</th>
                </tr>
                </thead>
                <tbody>
                <tr *ngFor="let c of customers | async" >
                    <td>{{c.id}}</td>
                    <td>{{c.name}}</td>
                    <td>{{c.email}}</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    </ng-container>
      <!-- <div *ngIf="errorMessage" class="message-danger">
            {{errorMessage|json}}
        </div> -->
        <ng-template #failure >
            <div class="text-danger">
                <h5> {{errorMessage}} </h5>
            </div>
        </ng-template>
</div>
